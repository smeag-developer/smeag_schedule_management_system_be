syntax = "proto3";

package notification;

option go_package ="buff/";
import "google/protobuf/timestamp.proto";
import "notification_message.proto";

message EventJoinNotificationRequest{
    notification.NotificationRequest notification_req = 1;
    notification.NotificationBody body = 2;
    EventInfo event_info = 3;
    notification.RequestorInfo requestor = 4;
    notification.ReceiverInfo receiver_info = 5;
    google.protobuf.Timestamp request_time_stamp = 6;
}

message EventNotificationStatusRequest {
  string id = 1;
  string notification_id = 2;
  string user_requestor_activity_id = 3;
  repeated EventJoiner event_joiner = 4;
}

message EventNotificationStatusResponse {
  string id = 1;
  string status_code = 2;
  string message = 3;
}

message EventInfo {
  string event_id = 1;
  string event_name = 2;
  string event_creator_id = 3;
  string status = 4;
  string role = 5;
}

message EventJoiner {
  string user_id = 1;
  string role = 2;
  string status = 3;
  string date_joined = 4; // ISO 8601 format
}

message EventVenue {
  string name = 1;
  string location = 2;
  string type = 3;
  double latitude = 4;
  double longitude = 5;
  string booking_event_status = 6;
}

message EventOrganizer {
  string organizer_id = 1;
  string organizer_name = 2;
  string organizer_contact = 3;
}
