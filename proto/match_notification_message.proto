syntax = "proto3";

package notification;

option go_package ="buff/";
import "google/protobuf/timestamp.proto";
import "notification_message.proto";

message JoinNotificationMatchRequest {
    string user_receiver_id = 1;
    notification.UserInfoRequestor user_requestor_info = 2;
    MatchInfo match_info = 3;
    string user_activity_id = 4;
    string notification_token_id =5;
    string device_type = 6;
    google.protobuf.Timestamp request_time_stamp = 7;
}

message JoinNotificationMatchResponse{
    string id =1;
    string notification_msg_id = 2;
    google.protobuf.Timestamp response_time_stamp = 3;
}
message MatchInfo {
    string id = 1;
    string match_name = 2;
    string match_date = 3;
    string land_mark = 4;
    bool is_paid = 5;
    float match_price = 6;
    string start_hour = 7;
    string end_hour = 8;
    string match_category = 9;
}