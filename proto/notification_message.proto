syntax = "proto3";

package notification;
option go_package ="buff/";

message NotificationBody{
    string title = 1;
    string body = 2;
    string image_url = 3;
    bool is_clicked = 5;
    int32 ttl = 6; 
    string time_stamp_request = 7;
}

message NotificationRequest{
    string notification_type = 1;
    string status = 2;
}

message UserInfoRequestor{
    string id = 1;
    string first_name = 2;
    string last_name = 3;
    string profile_pic = 4;
}

message ReceiverInfo {
  string id = 1;
  string user_activity_id = 2;
  string first_name = 3;
  string last_name = 4;
  string profile_pic = 5;
} 

message RequestorInfo {
  string id = 1;
  string user_activity_id = 2;
  string first_name = 3;
  string last_name = 4;
  string profile_pic = 5;
} 
