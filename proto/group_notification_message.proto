syntax = "proto3";

package notification;

option go_package ="buff/";
import "google/protobuf/timestamp.proto";
import "notification_message.proto";

message GroupJoinNotificationRequest{
    notification.NotificationRequest notification_req = 1;
    notification.NotificationBody body = 2;
    GroupInfo group_info = 3;
    notification.RequestorInfo requestor = 4;
    notification.ReceiverInfo receiver_info = 5;
    google.protobuf.Timestamp request_time_stamp = 6;
}

message GroupJoiner {
  string user_id = 1;
  string role = 2;
  string status = 3;
  string date_joined = 4; // ISO 8601 format
}

message GroupInfo{
    string id = 1;
    string group_id = 2;
    string group_name = 3;
    string group_creator_id = 4;
    string status = 5;
    string role = 6;
}

message GroupNotificationStatusRequest {
  string id = 1;
  string notification_id = 2;
  string user_requestor_activity_id = 3;
  repeated GroupJoiner group_joiners = 4;
}

message GroupNotificationStatusResponse {
  string id = 1;
  string status_code = 2;
  string message = 3;
}

message GroupReceiverInfo {
  string id = 1;
  string user_activity_id = 2;
  string first_name = 3;
  string last_name = 4;
  string profile_pic = 5;
} 

message GroupRequestorInfo {
  string id = 1;
  string user_activity_id = 2;
  string first_name = 3;
  string last_name = 4;
  string profile_pic = 5;
} 
